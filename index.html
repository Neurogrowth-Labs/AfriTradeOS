<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" type="image/jpeg" href="/assets/afritradeos.jpeg" />
    <link rel="apple-touch-icon" href="/assets/afritradeos.jpeg" />
    <title>AfriTradeOS</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        darkMode: 'class',
        theme: {
          extend: {
            colors: {
              trade: {
                primary: '#0B1F33', // Deep Trade Blue
                secondary: '#163A5F', // Lighter Blue for gradients/hovers
                accent: '#C9A24D',  // Pan-African Gold
                success: '#1FA971',
                warning: '#F5A623',
                error: '#D64545',
                bg: '#F7F9FC',      // Light Background
                surface: '#FFFFFF'
              },
              slate: {
                750: '#2d3748', 
                850: '#1a202c', 
                950: '#0f172a',
              }
            },
            fontFamily: {
              sans: ['Inter', 'sans-serif'],
              heading: ['General Sans', 'Inter', 'sans-serif'],
              mono: ['JetBrains Mono', 'monospace'],
            }
          }
        }
      }
    </script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin="" />
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap');
      @import url('https://api.fontshare.com/v2/css?f[]=general-sans@400,500,600,700,800&display=swap');
      :root {
        --text-primary: #0f172a;
        --text-secondary: rgba(15, 23, 42, 0.68);
        --text-muted: rgba(15, 23, 42, 0.48);
        --surface-base: rgba(255, 255, 255, 0.9);
        --surface-elevated: rgba(255, 255, 255, 0.94);
        --surface-border: rgba(148, 163, 184, 0.18);
        --shadow-soft: 0 10px 30px rgba(15, 23, 42, 0.08), 0 2px 10px rgba(15, 23, 42, 0.04);
        --shadow-card: 0 18px 45px rgba(15, 23, 42, 0.08), 0 8px 20px rgba(15, 23, 42, 0.04);
        --noise-opacity: 0.035;
      }
      body {
        font-family: 'Inter', sans-serif;
        background-color: #F7F9FC;
        color: var(--text-primary);
        font-size: 16px;
        line-height: 1.6;
        letter-spacing: 0.002em;
        text-rendering: optimizeLegibility;
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
        position: relative;
      }
      body::before {
        content: '';
        position: fixed;
        inset: 0;
        pointer-events: none;
        opacity: var(--noise-opacity);
        background-image:
          radial-gradient(circle at 20% 20%, rgba(15, 23, 42, 0.2) 0.5px, transparent 0.8px),
          radial-gradient(circle at 80% 30%, rgba(15, 23, 42, 0.12) 0.5px, transparent 0.8px),
          radial-gradient(circle at 30% 80%, rgba(15, 23, 42, 0.16) 0.5px, transparent 0.8px);
        background-size: 18px 18px, 22px 22px, 26px 26px;
        mix-blend-mode: multiply;
        z-index: 0;
      }
      h1, h2, h3, h4, h5, h6 {
        font-family: 'General Sans', 'Inter', sans-serif;
        color: var(--text-primary);
        letter-spacing: -0.02em;
      }
      #root {
        position: relative;
        z-index: 1;
      }
      .font-mono {
        font-family: 'JetBrains Mono', monospace;
      }
      .type-hero {
        font-family: 'General Sans', 'Inter', sans-serif;
        font-size: clamp(3rem, 5vw, 4.5rem);
        line-height: 1.08;
        letter-spacing: -0.03em;
        font-weight: 700;
      }
      .type-title {
        font-family: 'General Sans', 'Inter', sans-serif;
        font-size: clamp(1.75rem, 2.4vw, 2.5rem);
        line-height: 1.18;
        letter-spacing: -0.015em;
        font-weight: 700;
      }
      .type-header {
        font-family: 'General Sans', 'Inter', sans-serif;
        font-size: clamp(1.25rem, 1.8vw, 1.625rem);
        line-height: 1.32;
        letter-spacing: -0.01em;
        font-weight: 600;
      }
      .type-body {
        font-size: 0.95rem;
        line-height: 1.65;
        letter-spacing: 0.002em;
        font-weight: 400;
      }
      .type-caption {
        font-size: 0.75rem;
        line-height: 1.4;
        font-weight: 400;
        color: var(--text-secondary);
      }
      .text-secondary {
        color: var(--text-secondary);
      }
      .text-muted {
        color: var(--text-muted);
      }
      .section-shell {
        padding-block: clamp(3rem, 6vw, 6rem);
      }
      .container-shell {
        width: min(100%, 90rem);
        margin-inline: auto;
      }
      .content-shell {
        width: min(100%, 60rem);
      }
      .surface-glass {
        background: rgba(255, 255, 255, 0.8);
        backdrop-filter: blur(16px);
        -webkit-backdrop-filter: blur(16px);
        border: 1px solid rgba(255, 255, 255, 0.6);
      }
      .card-premium {
        background:
          linear-gradient(180deg, rgba(255, 255, 255, 0.96), rgba(248, 250, 252, 0.92));
        border: 1px solid var(--surface-border);
        border-radius: 1.25rem;
        box-shadow: var(--shadow-card);
      }
      .divider-soft {
        border-color: rgba(148, 163, 184, 0.16);
      }
      .input-premium {
        min-height: 3rem;
        border-radius: 0.9rem;
        border: 1px solid rgba(148, 163, 184, 0.22);
        background: rgba(248, 250, 252, 0.9);
        padding: 0.75rem 1rem;
        font-size: 0.9375rem;
        line-height: 1.5;
        transition: border-color 180ms ease-out, box-shadow 180ms ease-out, background-color 180ms ease-out, transform 180ms ease-out;
      }
      .input-premium:focus {
        outline: none;
        border-color: rgba(11, 31, 51, 0.35);
        box-shadow: 0 0 0 4px rgba(11, 31, 51, 0.08);
        background: rgba(255, 255, 255, 0.98);
      }
      .btn-primary,
      .btn-secondary,
      .btn-icon {
        transition:
          transform 180ms ease-out,
          box-shadow 180ms ease-out,
          background-color 180ms ease-out,
          border-color 180ms ease-out,
          color 180ms ease-out;
      }
      .btn-primary:hover,
      .btn-secondary:hover,
      .btn-icon:hover {
        transform: scale(1.02);
      }
      .btn-primary {
        min-height: 3rem;
        padding: 0.875rem 1.25rem;
        border-radius: 0.9rem;
        font-size: 0.9375rem;
        line-height: 1.2;
        font-weight: 600;
        letter-spacing: -0.01em;
        background: linear-gradient(135deg, #0b1f33 0%, #163a5f 100%);
        color: #fff;
        box-shadow: 0 14px 28px rgba(11, 31, 51, 0.18), 0 4px 12px rgba(11, 31, 51, 0.08);
      }
      .btn-primary:hover {
        box-shadow: 0 18px 32px rgba(11, 31, 51, 0.22), 0 6px 16px rgba(11, 31, 51, 0.1);
      }
      .btn-secondary {
        min-height: 3rem;
        padding: 0.875rem 1.25rem;
        border-radius: 0.9rem;
        font-size: 0.9375rem;
        line-height: 1.2;
        font-weight: 600;
        letter-spacing: -0.01em;
        border: 1px solid rgba(148, 163, 184, 0.26);
        color: var(--text-primary);
        background: rgba(255, 255, 255, 0.86);
        box-shadow: var(--shadow-soft);
      }
      .btn-icon {
        width: 2.5rem;
        height: 2.5rem;
        border-radius: 0.75rem;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        border: 1px solid rgba(148, 163, 184, 0.2);
        background: rgba(255, 255, 255, 0.78);
        box-shadow: var(--shadow-soft);
      }
      .dark {
        --text-primary: #f8fafc;
        --text-secondary: rgba(248, 250, 252, 0.72);
        --text-muted: rgba(248, 250, 252, 0.5);
        --surface-base: rgba(15, 23, 42, 0.82);
        --surface-elevated: rgba(15, 23, 42, 0.9);
        --surface-border: rgba(148, 163, 184, 0.16);
        --shadow-soft: 0 14px 36px rgba(2, 6, 23, 0.32), 0 4px 16px rgba(2, 6, 23, 0.18);
        --shadow-card: 0 20px 50px rgba(2, 6, 23, 0.36), 0 8px 20px rgba(2, 6, 23, 0.2);
      }
      .dark body::before {
        mix-blend-mode: screen;
      }
      .dark .surface-glass {
        background: rgba(15, 23, 42, 0.72);
        border-color: rgba(148, 163, 184, 0.18);
      }
      .dark .card-premium {
        background:
          linear-gradient(180deg, rgba(15, 23, 42, 0.94), rgba(15, 23, 42, 0.88));
      }
      .dark .input-premium {
        background: rgba(30, 41, 59, 0.72);
        color: #f8fafc;
        border-color: rgba(148, 163, 184, 0.18);
      }
      .dark .input-premium:focus {
        background: rgba(30, 41, 59, 0.92);
        border-color: rgba(201, 162, 77, 0.45);
        box-shadow: 0 0 0 4px rgba(201, 162, 77, 0.08);
      }
      .dark .btn-secondary,
      .dark .btn-icon {
        background: rgba(15, 23, 42, 0.74);
        color: #f8fafc;
        border-color: rgba(148, 163, 184, 0.18);
      }
      /* Custom scrollbar for data tables */
      .custom-scrollbar::-webkit-scrollbar {
        height: 6px;
        width: 6px;
      }
      .custom-scrollbar::-webkit-scrollbar-track {
        background: #f1f5f9;
      }
      .dark .custom-scrollbar::-webkit-scrollbar-track {
        background: #1e293b;
      }
      .custom-scrollbar::-webkit-scrollbar-thumb {
        background: #cbd5e1;
        border-radius: 3px;
      }
      .dark .custom-scrollbar::-webkit-scrollbar-thumb {
        background: #475569;
      }
      /* Leaflet custom styles */
      .leaflet-container {
        font-family: 'Inter', sans-serif;
      }
      .custom-marker {
        background: none;
        border: none;
      }
      .leaflet-popup-content-wrapper {
        border-radius: 0.75rem;
        padding: 0;
      }
      .leaflet-popup-content {
        margin: 0;
        width: auto !important;
      }
      .leaflet-popup-tip {
        display: none;
      }
      /* Dark mode adjustments for map tiles */
      .dark .leaflet-tile {
        filter: brightness(0.6) invert(1) contrast(3) hue-rotate(200deg) saturate(0.3) brightness(0.7);
      }
    </style>
  <script type="importmap">
{
  "imports": {
    "react": "https://esm.sh/react@^19.2.3",
    "react-dom/": "https://esm.sh/react-dom@^19.2.3/",
    "react/": "https://esm.sh/react@^19.2.3/",
    "@google/genai": "https://esm.sh/@google/genai@^1.34.0",
    "lucide-react": "https://esm.sh/lucide-react@^0.562.0",
    "recharts": "https://esm.sh/recharts@^3.6.0",
    "@supabase/supabase-js": "https://esm.sh/@supabase/supabase-js@2.39.3"
  }
}
</script>
</head>
  <body class="bg-trade-bg text-trade-primary dark:bg-slate-950 dark:text-slate-50 transition-colors duration-300">
    <div id="root"></div>
    <script type="module" src="/index.tsx"></script>
  </body>
</html>
